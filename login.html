<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form & Registration Form</title>

        <!--=============== REMIXICONS ===============-->
         <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css">

        <!--=============== CSS ===============-->
        <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="container">
        <div class="forms">
            <div class="form login">
                <span class="title">Login Form</span>

                <form action="#">
                    <div class="input-field">
                        <input type="email" placeholder="Enter your email"required>
                        <i class="ri-mail-line"></i>
                    </div>
                    <div class="input-field">
                        <input type="password" class="password" placeholder="Enter your password"required>
                        <i class="ri-lock-password-line icon"></i>
                        <i class="ri-eye-off-line showHidePw"></i>
                        </div>

                        <div class="checkbox-text">
                            <div class="checkbox-content">
                                <input type="checkbox" id="logCheck">
                                <label for="logCheck" class="tezt">Remember me</label>
                            </div>

                            <a href="#" class="text">Forget password?</a>
                        </div>

                        <div class="input-field button">
                            <input type="submit" value=" Login Now">
                        </div>
                </form>

                <div class="login-signup">
                    <span class="text">Not a member?
                        <a href="#" class="text signup-link">signup now</a>
                    </span>
                </div>
            </div>

             <!-- Registration form -->
             <div class="form signup">
                <span class="title">Registration</span>
            
                <form action="#">
                    <div class="input-field">
                        <input type="text" placeholder="Enter your name" required>
                        <i class="ri-user-line"></i>
                    </div>
                    <div class="input-field">
                        <input type="text" placeholder="Enter your email" required>
                        <i class="ri-mail-line"></i>
                    </div>
                    <div class="input-field">
                        <input type="password" class="password" placeholder="Create a password" required>
                        <i class="ri-lock-password-line icon"></i>
                    </div>
                    <div class="input-field">
                        <input type="password" class="password" placeholder="Confirm your password" required>
                        <i class="ri-lock-password-line icon"></i>
                        <i class="ri-eye-off-line showHidePw"></i>
                    </div>
            
                    <div class="checkbox-text">
                        <div class="checkbox-content">
                            <input type="checkbox" id="sigCheck">
                            <label for="sigCheck" class="tezt">Remember me</label>
                        </div>
            
                        <a href="#" class="text">Forget password?</a>
                    </div>
            
                    <div class="input-field button">
                        <input type="submit" value="Sign Up Now">
                    </div>
                </form>
            
                <div class="login-signup">
                    <span class="text">Already have an account?
                        <a href="#" class="text login-link">Login Now</a>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="login.js"></script>

      <!--===========MAIN JS===========-->
    <script src="main.js"></script>
</body>

    
    
</html>
